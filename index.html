<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Kegel — Suelo pélvico</title>
  <meta name="description" content="Entrenamiento guiado del suelo pélvico. Datos solo en tu dispositivo." />
  <meta name="theme-color" content="#0E1A1C" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kegel" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="icon" href="./icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="head">
      <div class="head__brand">
        <span class="head__mark">Kegel</span>
        <span class="head__sub">Suelo pélvico</span>
      </div>
      <button class="iconbtn" id="goSettings" aria-label="Ajustes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <circle cx="12" cy="12" r="3.2"/>
          <path d="M19.4 13.5a1.8 1.8 0 0 0 .36 1.98l.05.05a2 2 0 1 1-2.83 2.83l-.05-.05a1.8 1.8 0 0 0-3.05.74 1.8 1.8 0 0 0-.13.66V21a2 2 0 1 1-4 0v-.09a1.8 1.8 0 0 0-1.18-1.65 1.8 1.8 0 0 0-1.98.36l-.05.05A2 2 0 1 1 3.76 16.8l.05-.05a1.8 1.8 0 0 0 .37-1.98 1.8 1.8 0 0 0-1.65-1.1H2a2 2 0 1 1 0-4h.09a1.8 1.8 0 0 0 1.65-1.18 1.8 1.8 0 0 0-.36-1.98l-.05-.05A2 2 0 1 1 6.2 2.4l.05.05a1.8 1.8 0 0 0 1.98.37H8.3a1.8 1.8 0 0 0 1.1-1.65V1a2 2 0 1 1 4 0v.09a1.8 1.8 0 0 0 1.1 1.65 1.8 1.8 0 0 0 1.98-.37l.05-.05a2 2 0 1 1 2.83 2.83l-.05.05a1.8 1.8 0 0 0-.37 1.98v.04a1.8 1.8 0 0 0 1.65 1.1H23a2 2 0 1 1 0 4h-.09a1.8 1.8 0 0 0-1.51 1.05z"/>
        </svg>
      </button>
    </header>

    <main class="main">
      <section class="screen is-active" id="screen-today" aria-label="Hoy"></section>
      <section class="screen" id="screen-train" aria-label="Entrenar"></section>
      <section class="screen" id="screen-progress" aria-label="Progreso"></section>
      <section class="screen" id="screen-journal" aria-label="Diario"></section>
      <section class="screen" id="screen-info" aria-label="Información"></section>
      <section class="screen" id="screen-settings" aria-label="Ajustes"></section>
    </main>
  </div>

  <nav class="tabs" aria-label="Navegación">
    <button class="tab is-active" data-screen="today">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      Hoy
    </button>
    <button class="tab" data-screen="train">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="8.5"/></svg>
      Entrenar
    </button>
    <button class="tab" data-screen="progress">
      <svg viewBox="0 0 24 24"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16v-4M12 16V8M16 16v-6"/></svg>
      Progreso
    </button>
    <button class="tab" data-screen="journal">
      <svg viewBox="0 0 24 24"><path d="M6 3h12v18l-6-3-6 3z"/></svg>
      Diario
    </button>
    <button class="tab" data-screen="info">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><path d="M12 8h.01"/></svg>
      Info
    </button>
  </nav>

  <!-- Guided session overlay -->
  <div class="player" id="player" aria-hidden="true">
    <div class="player__top">
      <div>
        <div class="player__group" id="plGroup">Lentas</div>
        <div class="player__rep" id="plRep">1 / 10</div>
      </div>
      <button class="iconbtn" id="plClose" aria-label="Salir de la sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>

    <div class="player__mid">
      <div class="ring" id="plRing" data-phase="release">
        <div class="ring__halo"></div>
        <div class="ring__disc"></div>
        <div class="ring__core">
          <div class="ring__phase" id="plPhase">Prepárate</div>
          <div class="ring__count" id="plCount">3<small>s</small></div>
        </div>
      </div>
    </div>

    <div class="progressbar"><div class="progressbar__fill" id="plBar"></div></div>
    <div class="player__ctrl">
      <button class="btn btn--ghost" id="plPause">Pausa</button>
      <button class="btn btn--ghost" id="plSkip">Saltar</button>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="./core.js"></script>
  <script src="./app.js"></script>
</body>
</html>
